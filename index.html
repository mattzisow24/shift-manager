<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shift Manager">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Shift Manager</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --black: #1a1a1a;
  --black-mid: #2a2a2a;
  --black-light: #3a3a3a;
  --green-field: #52b788;
  --orange: #e8651a;
  --orange-light: #f07830;
  --white: #ffffff;
  --gray-light: #e9ecef;
  --gray: #adb5bd;
  --gray-dark: #6c757d;
  --red: #e63946;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
  background: var(--black);
  color: var(--white);
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  user-select: none;
  -webkit-user-select: none;
}

/* --- AUTH SCREEN --- */
.auth-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  padding: 24px;
  gap: 20px;
}
.auth-screen.hidden { display: none; }
.auth-logo { height: 80px; }
.auth-title { font-size: 28px; font-weight: 700; }
.auth-subtitle { font-size: 14px; color: var(--gray); margin-top: -12px; }
.auth-btn {
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: white;
  color: #333;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.auth-btn:active { opacity: 0.8; }
.auth-error {
  color: var(--red);
  font-size: 13px;
  text-align: center;
  min-height: 18px;
}

/* --- APP WRAPPER --- */
.app-wrapper { display: none; height: 100dvh; flex-direction: column; }
.app-wrapper.active { display: flex; }

/* --- NAV --- */
.nav {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(0,0,0,0.3);
  height: 48px;
}
.nav-title {
  font-size: 18px;
  font-weight: 700;
  margin-right: auto;
}
.nav-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.3);
  background: transparent;
  color: var(--white);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.nav-btn.active {
  background: var(--orange);
  border-color: var(--orange);
}
.nav-signout {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.2);
  background: transparent;
  color: var(--gray);
  font-size: 11px;
  cursor: pointer;
}

/* --- SCREENS --- */
.screen { display: none; height: calc(100dvh - 48px); overflow-y: auto; }
.screen.active { display: flex; flex-direction: column; }

/* --- ROSTER SCREEN --- */
.roster-screen { padding: 16px; gap: 12px; }
.roster-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.roster-header h2 { font-size: 20px; }
.add-player-row { display: flex; gap: 8px; }
.add-player-row input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.15);
  color: white;
}
.add-player-row input::placeholder { color: rgba(255,255,255,0.5); }
.btn {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-primary { background: var(--orange); color: white; }
.btn-danger { background: var(--red); color: white; }
.btn-gold { background: var(--orange); color: white; }
.btn-sm { padding: 6px 12px; font-size: 13px; }

.roster-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
  flex: 1;
  overflow-y: auto;
}
.roster-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  transition: background 0.15s;
}
.roster-card.checked-in { background: var(--orange); }
.roster-check {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 2px solid rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.roster-card.checked-in .roster-check {
  background: white;
  border-color: white;
  color: var(--orange);
}
.roster-name { font-size: 16px; font-weight: 500; flex: 1; }
.roster-delete {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.roster-count { font-size: 14px; color: var(--gray); }

/* --- GAME SETUP --- */
.setup-screen { padding: 16px; gap: 16px; }
.setup-screen h2 { font-size: 20px; }
.setup-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.setup-row label { font-size: 14px; font-weight: 600; min-width: 120px; }
.setup-row select, .setup-row input[type="number"] {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.15);
  color: white;
}
.setup-row option { color: black; }

/* --- SHIFTS SCREEN --- */
.shifts-screen.active { display: flex; flex-direction: column; }
.shifts-top-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(0,0,0,0.2);
  flex-wrap: wrap;
}
.shift-tab {
  padding: 6px 14px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.2);
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.shift-tab.active { background: var(--orange); color: white; border-color: var(--orange); }
.half-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray);
  margin-right: 4px;
}

.field-and-bench {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* --- FIELD --- */
.field-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  position: relative;
}
.field {
  width: 100%;
  max-width: 600px;
  aspect-ratio: 1.4;
  background: linear-gradient(180deg, var(--green-field) 0%, #3da77a 100%);
  border-radius: 12px;
  border: 3px solid rgba(255,255,255,0.4);
  position: relative;
  overflow: hidden;
}
.field::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 10%;
  right: 10%;
  height: 2px;
  background: rgba(255,255,255,0.25);
  pointer-events: none;
}
.field::after {
  content: '';
  position: absolute;
  top: 25%;
  left: 30%;
  right: 30%;
  bottom: 25%;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  pointer-events: none;
}

.field-slot {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 72px;
  min-height: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  z-index: 10;
}
.field-slot .pos-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: rgba(255,255,255,0.7);
}
.field-slot .player-badge {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  min-width: 64px;
  border: 2px dashed rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.2);
  white-space: nowrap;
}
.field-slot .player-badge.filled {
  background: rgba(255,255,255,0.95);
  color: var(--black);
  border: 2px solid white;
}
.field-slot .player-badge.highlight-stay {
  background: var(--gray-dark);
  color: white;
  border-color: var(--gray-dark);
}
.field-slot .player-badge.highlight-move {
  background: var(--orange);
  color: white;
  border-color: var(--orange);
}
.field-slot .player-badge.highlight-on {
  background: #2ecc71;
  color: white;
  border-color: #2ecc71;
}

/* --- BENCH --- */
.bench-panel {
  width: 200px;
  background: rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  padding: 12px;
  gap: 6px;
  overflow-y: auto;
}
.bench-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray);
  margin-bottom: 4px;
}
.bench-player {
  padding: 8px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.bench-player:active { background: rgba(255,255,255,0.25); }
.bench-player.selected {
  background: var(--orange);
  color: white;
}
.bench-player.on-field {
  opacity: 0.3;
  pointer-events: none;
  text-decoration: line-through;
}

/* --- TRANSITIONS SCREEN --- */
.transitions-screen { padding: 16px; gap: 16px; overflow-y: auto; }
.transitions-screen h2 { font-size: 20px; }
.transition-section { margin-bottom: 12px; }
.transition-section h3 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.transition-section h3.off { color: var(--red); }
.transition-section h3.stay { color: var(--gray); }
.transition-section h3.move { color: var(--orange); }
.transition-section h3.on { color: #2ecc71; }
.transition-item {
  padding: 8px 14px;
  border-radius: 8px;
  margin-bottom: 4px;
  font-size: 16px;
  font-weight: 500;
}
.transition-item.off { background: rgba(230,57,70,0.2); }
.transition-item.stay { background: rgba(72,149,239,0.2); }
.transition-item.move { background: rgba(232,101,26,0.2); }
.transition-item.on { background: rgba(46,204,113,0.2); }
.transition-arrow { color: var(--gray); font-size: 13px; }
.no-changes { color: var(--gray); font-style: italic; }
.transition-nav { display: flex; gap: 8px; align-items: center; }
.transition-nav select {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.15);
  color: white;
  flex: 1;
}
.transition-nav option { color: black; }
.callout-box {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  padding: 16px;
  flex: 1;
  overflow-y: auto;
}
.callout-big {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 4px;
}

/* --- TIMER --- */
.timer-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: rgba(0,0,0,0.4);
}
.timer-display {
  font-size: 28px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  min-width: 90px;
}
.timer-display.warning { color: var(--orange); }
.timer-display.danger { color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }
.timer-label { font-size: 13px; color: var(--gray); }
.timer-btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.timer-btn.start { background: #2ecc71; color: white; }
.timer-btn.pause { background: var(--orange); color: white; }
.timer-btn.reset { background: rgba(255,255,255,0.15); color: white; }
.timer-shift-info { margin-left: auto; font-size: 13px; color: var(--gray); text-align: right; }

/* --- PLAYING TIME SCREEN --- */
.playtime-screen { padding: 16px; gap: 12px; overflow-y: auto; }
.playtime-screen h2 { font-size: 20px; }
.playtime-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.playtime-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.playtime-table td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.playtime-bar-bg {
  height: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.1);
  min-width: 100px;
}
.playtime-bar {
  height: 100%;
  border-radius: 4px;
  background: var(--orange);
  transition: width 0.3s;
}
.playtime-bar.low { background: var(--red); }
.playtime-bar.mid { background: var(--orange-light); }

/* --- MODAL --- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #2d3748;
  border-radius: 16px;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h3 { font-size: 18px; margin-bottom: 12px; }
.modal-player {
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 4px;
  font-size: 16px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  transition: background 0.15s;
}
.modal-player:active { background: rgba(255,255,255,0.2); }
.modal-player.current { background: var(--orange); }
.modal-close {
  margin-top: 12px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

/* --- AUTO-FILL --- */
.auto-fill-bar {
  display: flex;
  gap: 8px;
  padding: 4px 0;
  align-items: center;
}
.auto-fill-bar .btn { font-size: 12px; padding: 4px 10px; }

/* --- SYNC STATUS --- */
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #2ecc71;
  display: inline-block;
  margin-left: 4px;
}
.sync-dot.offline { background: var(--gray); }
.sync-dot.syncing { background: var(--orange); animation: pulse 1s infinite; }

/* ==============================
   PHONE-FRIENDLY RESPONSIVE
   ============================== */
@media (max-width: 600px) {
  /* --- NAV: scrollable row, smaller buttons --- */
  .nav {
    padding: 6px 10px;
    gap: 6px;
    height: auto;
    min-height: 44px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap;
  }
  .nav-title { font-size: 14px; margin-right: 8px; min-width: max-content; }
  .nav-btn { padding: 5px 10px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .nav-signout { font-size: 10px; padding: 3px 8px; flex-shrink: 0; }
  .nav img { height: 28px !important; }

  /* --- SCREENS: allow scroll --- */
  .screen { height: calc(100dvh - 44px); }

  /* --- ROSTER --- */
  .roster-screen { padding: 12px; gap: 10px; }
  .roster-list { grid-template-columns: 1fr; }
  .roster-header h2 { font-size: 17px; }

  /* --- SHIFTS: stack field + bench vertically --- */
  .field-and-bench {
    flex-direction: column;
    overflow-y: auto;
  }
  .field-container {
    padding: 8px;
    flex: none;
  }
  .field {
    aspect-ratio: 1.1;
    max-width: 100%;
  }
  .field-slot {
    width: 58px;
    min-height: 36px;
  }
  .field-slot .pos-label { font-size: 8px; }
  .field-slot .player-badge { font-size: 11px; min-width: 52px; padding: 3px 6px; }

  .bench-panel {
    width: 100%;
    max-height: 160px;
    flex-direction: column;
    overflow-y: auto;
    padding: 8px 12px;
  }
  #bench-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .bench-player { padding: 6px 10px; font-size: 13px; }

  .auto-fill-bar { justify-content: center; }

  /* --- SHIFTS TOP BAR: scrollable --- */
  .shifts-top-bar {
    padding: 6px 10px;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap;
  }
  .shift-tab { padding: 5px 10px; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
  .half-label { font-size: 10px; white-space: nowrap; flex-shrink: 0; }

  /* --- TIMER BAR: wrap on phone --- */
  .timer-bar {
    flex-wrap: wrap;
    padding: 8px 12px;
    gap: 8px;
  }
  .timer-display { font-size: 22px; min-width: 70px; }
  .timer-label { font-size: 11px; }
  .timer-btn { padding: 6px 12px; font-size: 13px; }
  .timer-shift-info { margin-left: 0; font-size: 12px; text-align: left; width: 100%; }

  /* --- CALL SUBS / TRANSITIONS --- */
  .transitions-screen { padding: 12px; gap: 12px; }
  .transitions-screen h2 { font-size: 17px; }
  .callout-big { font-size: 20px; }
  .callout-box { padding: 12px; }
  .transition-nav select { font-size: 14px; padding: 6px 10px; }

  /* --- PLAYING TIME TABLE: horizontal scroll --- */
  .playtime-screen { padding: 12px; }
  .playtime-screen h2 { font-size: 17px; }
  .playtime-table { font-size: 12px; display: block; overflow-x: auto; }
  .playtime-table th { padding: 6px 8px; font-size: 10px; white-space: nowrap; }
  .playtime-table td { padding: 6px 8px; white-space: nowrap; }
  .playtime-bar-bg { min-width: 60px; }

  /* --- MODAL: wider on phone --- */
  .modal { width: 95%; padding: 16px; }
  .modal h3 { font-size: 16px; }
  .modal-player { padding: 10px 12px; font-size: 15px; }

  /* --- AUTH SCREEN --- */
  .auth-logo { height: 60px; }
  .auth-title { font-size: 22px; }
  .auth-btn { font-size: 14px; padding: 12px; }
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="auth-screen">
  <img src="logo.png" alt="Logo" class="auth-logo">
  <div class="auth-title">Shift Manager</div>
  <div class="auth-subtitle">Sign in to manage the lads</div>
  <div class="auth-error" id="auth-error"></div>
  <button class="auth-btn" id="google-signin-btn" style="display:flex;align-items:center;justify-content:center;gap:10px;max-width:360px;width:100%;">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google
  </button>
</div>

<!-- APP (hidden until logged in) -->
<div class="app-wrapper" id="app-wrapper">
  <nav class="nav">
    <img src="logo.png" alt="Logo" style="height:36px;width:auto;">
    <div class="nav-title">Shift Manager</div>
    <button class="nav-btn active" data-screen="roster">Roster</button>
    <button class="nav-btn" data-screen="shifts">Shifts</button>
    <button class="nav-btn" data-screen="transitions">Call Subs</button>
    <button class="nav-btn" data-screen="playtime">Play Time</button>
    <span class="sync-dot" id="sync-dot" title="Synced"></span>
    <button class="nav-signout" id="signout-btn">Sign Out</button>
  </nav>

  <!-- ROSTER -->
  <div class="screen roster-screen active" id="roster-screen">
    <div class="roster-header">
      <h2>Team Roster</h2>
      <span class="roster-count" id="roster-count"></span>
    </div>
    <div class="add-player-row">

<script>
// ---- FIREBASE INIT ----
firebase.initializeApp({
  apiKey: "AIzaSyBGRVuo3FN6kVBcfRO3ikzcGP1jDAL0h1o",
  authDomain: "river-plate-shift-manager.firebaseapp.com",
  projectId: "river-plate-shift-manager",
  storageBucket: "river-plate-shift-manager.firebasestorage.app",
  messagingSenderId: "301886559365",
  appId: "1:301886559365:web:4f1ad2f29fae9877c805ec"
});

const auth = firebase.auth();
const db = firebase.firestore();

// Enable Firestore offline persistence
db.enablePersistence({ synchronizeTabs: true }).catch(err => {
  console.log('Firestore persistence error:', err.code);
});

// ---- AUTH ----
const authScreen = document.getElementById('auth-screen');
const appWrapper = document.getElementById('app-wrapper');
const authError = document.getElementById('auth-error');
const googleProvider = new firebase.auth.GoogleAuthProvider();

document.getElementById('google-signin-btn').addEventListener('click', async () => {
  authError.textContent = '';
  try {
    await auth.signInWithPopup(googleProvider);
  } catch (err) {
    if (err.code === 'auth/popup-blocked') {
      // Fallback to redirect for iPad/Safari where popups are blocked
      await auth.signInWithRedirect(googleProvider);
    } else if (err.code !== 'auth/popup-closed-by-user') {
      authError.textContent = err.message;
    }
  }
});

document.getElementById('signout-btn').addEventListener('click', () => {
  auth.signOut();
});

// Listen for auth state
let currentUid = null;
auth.onAuthStateChanged(user => {
  if (user) {
    currentUid = user.uid;
    authScreen.classList.add('hidden');
    appWrapper.classList.add('active');
    startRealtimeSync();
  } else {
    currentUid = null;
    if (unsubscribeListener) { unsubscribeListener(); unsubscribeListener = null; }
    authScreen.classList.remove('hidden');
    appWrapper.classList.remove('active');
  }
});

// ---- SYNC STATUS ----
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (status === 'offline' ? ' offline' : status === 'syncing' ? ' syncing' : '');
  dot.title = status === 'offline' ? 'Offline' : status === 'syncing' ? 'Syncing...' : 'Synced';
}

// ---- STATE ----
const DEFAULT_ROSTER = [
  'John', 'Jibby', 'Justin', 'Charlie L', 'Charlie C', 'Emmet', 'Andrew', 'Angel',
  'Sam', 'Theo K', 'Theo F', 'Colby', 'Duanze', 'Eamon', 'Felipe', 'Guillermo',
  'Otto', 'Tom', 'David', 'Greyson'
];

let state = defaultState();

function defaultState() {
  return {
    roster: [...DEFAULT_ROSTER],
    checkedIn: [],
    halves: 2,
    shiftsPerHalf: 3,
    minutesPerHalf: 35,
    shifts: {},
    timerElapsed: 0,
    currentShiftIndex: 0,
  };
}

// Shared team document — all coaches read/write the same data
const TEAM_DOC = db.collection('teams').doc('river-plate');
let unsubscribeListener = null;
let localSave = false; // flag to ignore our own writes from the listener

// Save to Firestore + localStorage
let saveTimeout = null;
function saveState() {
  // Always save to localStorage immediately for offline speed
  localStorage.setItem('shift-manager-team-state', JSON.stringify(state));

  // Debounce Firestore writes
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    if (!currentUid) return;
    setSyncStatus('syncing');
    localSave = true;
    TEAM_DOC.set({
      roster: state.roster,
      checkedIn: state.checkedIn,
      halves: state.halves,
      shiftsPerHalf: state.shiftsPerHalf,
      minutesPerHalf: state.minutesPerHalf,
      shifts: state.shifts,
      timerElapsed: state.timerElapsed,
      currentShiftIndex: state.currentShiftIndex,
      updatedBy: currentUid,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      setSyncStatus('online');
    }).catch(() => {
      setSyncStatus('offline');
    });
  }, 500);
}

// Subscribe to real-time updates from the shared team document
function startRealtimeSync() {
  // Load from localStorage first for instant display
  try {
    const local = JSON.parse(localStorage.getItem('shift-manager-team-state'));
    if (local && local.roster) {
      state = { ...defaultState(), ...local };
      renderAll();
    }
  } catch {}

  // Listen for real-time changes — fires immediately with cached data, then on every update
  if (unsubscribeListener) unsubscribeListener();
  unsubscribeListener = TEAM_DOC.onSnapshot(doc => {
    if (localSave) {
      // This is our own write echoing back — skip re-render
      localSave = false;
      return;
    }
    if (doc.exists) {
      const data = doc.data();
      state = { ...defaultState(), ...data };
      if (!state.roster || state.roster.length === 0) state.roster = [...DEFAULT_ROSTER];
      localStorage.setItem('shift-manager-team-state', JSON.stringify(state));
      setSyncStatus(doc.metadata.fromCache ? 'offline' : 'online');
      renderAll();
    } else {
      // First time — initialize the shared team doc
      state = defaultState();
      saveState();
      renderAll();
    }
  }, err => {
    console.log('Firestore listener error:', err);
    setSyncStatus('offline');
  });
}

function renderAll() {
  renderRoster();
  updateTimerBtn();
  updateTimerDisplay();
}

// 4-3-3 formation positions (percentage-based coordinates)
const POSITIONS = [
  { id: 'gk',  label: 'GK',  x: 50, y: 90 },
  { id: 'lb',  label: 'LB',  x: 15, y: 72 },
  { id: 'lcb', label: 'LCB', x: 38, y: 75 },
  { id: 'rcb', label: 'RCB', x: 62, y: 75 },
  { id: 'rb',  label: 'RB',  x: 85, y: 72 },
  { id: 'lm',  label: 'LM',  x: 22, y: 47 },
  { id: 'cdm', label: 'CDM', x: 50, y: 52 },
  { id: 'rm',  label: 'RM',  x: 78, y: 47 },
  { id: 'lw',  label: 'LW',  x: 18, y: 20 },
  { id: 'st',  label: 'ST',  x: 50, y: 15 },
  { id: 'rw',  label: 'RW',  x: 82, y: 20 },
];

// ---- NAVIGATION ----
const screens = { roster: 'roster-screen', shifts: 'shifts-screen', transitions: 'transitions-screen', playtime: 'playtime-screen' };
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(screens[btn.dataset.screen]).classList.add('active');
    if (btn.dataset.screen === 'shifts') renderShifts();
    if (btn.dataset.screen === 'transitions') renderTransitions();
    if (btn.dataset.screen === 'playtime') renderPlaytime();
  });
});

// ---- ROSTER ----
function renderRoster() {
  const list = document.getElementById('roster-list');
  const count = document.getElementById('roster-count');
  const checkedCount = state.checkedIn.length;
  count.textContent = `${state.roster.length} players | ${checkedCount} checked in`;

  list.innerHTML = [...state.roster].sort((a, b) => a.localeCompare(b)).map(name => {
    const checked = state.checkedIn.includes(name);
    return `<div class="roster-card ${checked ? 'checked-in' : ''}" data-name="${esc(name)}">
      <div class="roster-check">${checked ? '✓' : ''}</div>
      <div class="roster-name">${esc(name)}</div>
      <button class="roster-delete" data-del="${esc(name)}">x</button>
    </div>`;
  }).join('');

  list.querySelectorAll('.roster-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.roster-delete')) return;
      const name = card.dataset.name;
      if (state.checkedIn.includes(name)) {
        state.checkedIn = state.checkedIn.filter(n => n !== name);
      } else {
        state.checkedIn.push(name);
      }
      saveState();
      renderRoster();
    });
  });

  list.querySelectorAll('.roster-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const name = btn.dataset.del;
      if (confirm(`Remove ${name} from roster?`)) {
        state.roster = state.roster.filter(n => n !== name);
        state.checkedIn = state.checkedIn.filter(n => n !== name);
        Object.keys(state.shifts).forEach(k => {
          const shift = state.shifts[k];
          Object.keys(shift).forEach(pos => { if (shift[pos] === name) delete shift[pos]; });
        });
        saveState();
        renderRoster();
      }
    });
  });
}

document.getElementById('add-player-btn').addEventListener('click', addPlayer);
document.getElementById('new-player-input').addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

function addPlayer() {
  const input = document.getElementById('new-player-input');
  const name = input.value.trim();
  if (!name) return;
  if (state.roster.includes(name)) { alert('Player already exists'); return; }
  state.roster.push(name);
  state.checkedIn.push(name);
  input.value = '';
  saveState();
  renderRoster();
}

document.getElementById('check-all-btn').addEventListener('click', () => {
  if (state.checkedIn.length === state.roster.length) {
    state.checkedIn = [];
  } else {
    state.checkedIn = [...state.roster];
  }
  saveState();
  renderRoster();
});

// ---- SHIFTS ----
function totalShifts() { return state.halves * state.shiftsPerHalf; }
function shiftKey(i) { return `shift_${i}`; }
function getShift(i) { return state.shifts[shiftKey(i)] || {}; }

function renderShifts() {
  renderShiftTabs();
  renderField();
  renderBench();
  updateTimerDisplay();
}

function renderShiftTabs() {
  const bar = document.getElementById('shifts-top-bar');
  let html = '';
  for (let h = 0; h < state.halves; h++) {
    html += `<span class="half-label">${h === 0 ? '1st' : '2nd'} Half</span>`;
    for (let s = 0; s < state.shiftsPerHalf; s++) {
      const idx = h * state.shiftsPerHalf + s;
      html += `<button class="shift-tab ${idx === state.currentShiftIndex ? 'active' : ''}" data-shift="${idx}">Shift ${s + 1}</button>`;
    }
  }
  html += `<span style="margin-left:auto;display:flex;gap:6px;align-items:center;">
    <label style="font-size:12px;color:var(--gray);">Shifts/half:</label>
    <select id="sph-select" style="padding:4px 8px;border-radius:6px;border:none;background:rgba(255,255,255,0.15);color:white;font-size:13px;">
      ${[2,3,4].map(n => `<option value="${n}" ${n === state.shiftsPerHalf ? 'selected' : ''}>${n}</option>`).join('')}
    </select>
    <label style="font-size:12px;color:var(--gray);">Min/half:</label>
    <input type="number" id="mph-input" value="${state.minutesPerHalf}" min="10" max="45" style="width:50px;padding:4px 8px;border-radius:6px;border:none;background:rgba(255,255,255,0.15);color:white;font-size:13px;" />
  </span>`;
  bar.innerHTML = html;

  bar.querySelectorAll('.shift-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.currentShiftIndex = parseInt(tab.dataset.shift);
      saveState();
      renderShifts();
    });
  });

  document.getElementById('sph-select').addEventListener('change', e => {
    state.shiftsPerHalf = parseInt(e.target.value);
    if (state.currentShiftIndex >= totalShifts()) state.currentShiftIndex = totalShifts() - 1;
    saveState();
    renderShifts();
  });

  document.getElementById('mph-input').addEventListener('change', e => {
    state.minutesPerHalf = parseInt(e.target.value) || 35;
    saveState();
    renderShifts();
  });
}

function renderField() {
  const field = document.getElementById('field');
  const shift = getShift(state.currentShiftIndex);

  field.innerHTML = POSITIONS.map(pos => {
    const player = shift[pos.id];
    const filledClass = player ? 'filled' : '';
    return `<div class="field-slot" style="left:${pos.x}%;top:${pos.y}%;" data-pos="${pos.id}">
      <span class="pos-label">${pos.label}</span>
      <span class="player-badge ${filledClass}">${player ? esc(displayName(player)) : '—'}</span>
    </div>`;
  }).join('');

  field.querySelectorAll('.field-slot').forEach(slot => {
    slot.addEventListener('click', () => openAssignModal(slot.dataset.pos));
  });
}

function renderBench() {
  const benchList = document.getElementById('bench-list');
  const benchTitle = document.getElementById('bench-title');
  const shift = getShift(state.currentShiftIndex);
  const onField = new Set(Object.values(shift));
  const bench = state.checkedIn.filter(n => !onField.has(n));
  benchTitle.textContent = `Bench (${bench.length})`;

  benchList.innerHTML = [...state.checkedIn].sort((a, b) => a.localeCompare(b)).map(name => {
    const isOnField = onField.has(name);
    return `<div class="bench-player ${isOnField ? 'on-field' : ''}" data-name="${esc(name)}">${esc(displayName(name))}</div>`;
  }).join('');

  benchList.querySelectorAll('.bench-player:not(.on-field)').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.name;
      const shift = getShift(state.currentShiftIndex);
      const emptyPos = POSITIONS.find(p => !shift[p.id]);
      if (emptyPos) {
        if (!state.shifts[shiftKey(state.currentShiftIndex)]) state.shifts[shiftKey(state.currentShiftIndex)] = {};
        state.shifts[shiftKey(state.currentShiftIndex)][emptyPos.id] = name;
        saveState();
        renderField();
        renderBench();
      }
    });
  });
}

// Assign modal
let assigningPos = null;

function openAssignModal(posId) {
  assigningPos = posId;
  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const playersList = document.getElementById('modal-players');
  const pos = POSITIONS.find(p => p.id === posId);
  const shift = getShift(state.currentShiftIndex);
  const currentPlayer = shift[posId];

  title.textContent = `Assign ${pos.label}`;

  let html = '';
  if (currentPlayer) {
    html += `<div class="modal-player" data-assign="" style="color:var(--red);">Remove ${esc(displayName(currentPlayer))}</div>`;
  }
  [...state.checkedIn].sort((a, b) => a.localeCompare(b)).forEach(name => {
    const assignedPos = Object.entries(shift).find(([k, v]) => v === name);
    const isCurrent = name === currentPlayer;
    let label = esc(name);
    if (assignedPos && !isCurrent) label += ` <span style="color:var(--gray);font-size:12px;">(${assignedPos[0].toUpperCase()})</span>`;
    html += `<div class="modal-player ${isCurrent ? 'current' : ''}" data-assign="${esc(name)}">${label}</div>`;
  });

  playersList.innerHTML = html;
  overlay.classList.add('active');

  playersList.querySelectorAll('.modal-player').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.assign;
      if (!state.shifts[shiftKey(state.currentShiftIndex)]) state.shifts[shiftKey(state.currentShiftIndex)] = {};
      const shift = state.shifts[shiftKey(state.currentShiftIndex)];
      if (name) {
        Object.keys(shift).forEach(k => { if (shift[k] === name) delete shift[k]; });
        shift[assigningPos] = name;
      } else {
        delete shift[assigningPos];
      }
      saveState();
      overlay.classList.remove('active');
      renderField();
      renderBench();
    });
  });
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('active');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});

document.getElementById('clear-shift-btn').addEventListener('click', () => {
  state.shifts[shiftKey(state.currentShiftIndex)] = {};
  saveState();
  renderField();
  renderBench();
});

document.getElementById('copy-prev-btn').addEventListener('click', () => {
  if (state.currentShiftIndex === 0) { alert('No previous shift'); return; }
  const prev = getShift(state.currentShiftIndex - 1);
  state.shifts[shiftKey(state.currentShiftIndex)] = { ...prev };
  saveState();
  renderField();
  renderBench();
});

// ---- TIMER ----
let timerInterval = null;
let timerRunning = false;

function shiftDuration() {
  return (state.minutesPerHalf / state.shiftsPerHalf) * 60;
}

document.getElementById('timer-start-btn').addEventListener('click', () => {
  if (timerRunning) {
    timerRunning = false;
    clearInterval(timerInterval);
    updateTimerBtn();
  } else {
    timerRunning = true;
    let lastTick = Date.now();
    timerInterval = setInterval(() => {
      const now = Date.now();
      state.timerElapsed += (now - lastTick) / 1000;
      lastTick = now;
      updateTimerDisplay();
      checkShiftAlarm();
    }, 250);
    updateTimerBtn();
  }
});

document.getElementById('timer-reset-btn').addEventListener('click', () => {
  timerRunning = false;
  state.timerElapsed = 0;
  clearInterval(timerInterval);
  saveState();
  updateTimerDisplay();
  updateTimerBtn();
});

function updateTimerDisplay() {
  const display = document.getElementById('timer-display');
  const label = document.getElementById('timer-label');
  const info = document.getElementById('timer-shift-info');
  const dur = shiftDuration();
  const gameElapsed = state.timerElapsed;
  const currentShiftNum = Math.min(Math.floor(gameElapsed / dur), totalShifts() - 1);
  const shiftElapsed = gameElapsed - (currentShiftNum * dur);
  const remaining = Math.max(0, dur - shiftElapsed);

  const mins = Math.floor(remaining / 60);
  const secs = Math.floor(remaining % 60);
  display.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

  display.className = 'timer-display';
  if (remaining < 60 && remaining > 15) display.classList.add('warning');
  if (remaining <= 15 && timerRunning) display.classList.add('danger');

  const halfNum = Math.floor(currentShiftNum / state.shiftsPerHalf) + 1;
  const shiftInHalf = (currentShiftNum % state.shiftsPerHalf) + 1;
  label.textContent = `Half ${halfNum} · Shift ${shiftInHalf}`;

  const gameMins = Math.floor(gameElapsed / 60);
  const gameSecs = Math.floor(gameElapsed % 60);
  info.textContent = `Game: ${gameMins}:${gameSecs.toString().padStart(2, '0')} | ${Math.round(dur / 60)} min shifts`;
}

function updateTimerBtn() {
  const btn = document.getElementById('timer-start-btn');
  if (timerRunning) {
    btn.textContent = 'Pause';
    btn.className = 'timer-btn pause';
  } else {
    btn.textContent = 'Start';
    btn.className = 'timer-btn start';
  }
}

let lastAlarmShift = -1;
function checkShiftAlarm() {
  const dur = shiftDuration();
  const currentShiftNum = Math.floor(state.timerElapsed / dur);
  if (currentShiftNum > lastAlarmShift && currentShiftNum > 0 && currentShiftNum < totalShifts()) {
    lastAlarmShift = currentShiftNum;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 200, 400].forEach(delay => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        osc.start(ctx.currentTime + delay / 1000);
        osc.stop(ctx.currentTime + delay / 1000 + 0.15);
      });
    } catch {}
  }
}

// ---- TRANSITIONS ----
function renderTransitions() {
  const select = document.getElementById('transition-select');
  let html = '';
  for (let i = 1; i < totalShifts(); i++) {
    const halfNum = Math.floor(i / state.shiftsPerHalf) + 1;
    const shiftInHalf = (i % state.shiftsPerHalf) + 1;
    const ordinal = n => n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : n + 'th';
    const halfName = ordinal(halfNum) + ' Half';
    const shiftName = ordinal(shiftInHalf) + ' Shift';
    html += `<option value="${i}">${halfName}: ${shiftName}</option>`;
  }
  select.innerHTML = html;
  select.addEventListener('change', () => renderTransitionDetail(parseInt(select.value)));
  if (totalShifts() > 1) renderTransitionDetail(1);
}

function renderTransitionDetail(toIndex) {
  const box = document.getElementById('callout-box');
  const prev = getShift(toIndex - 1);
  const next = getShift(toIndex);

  if (Object.keys(prev).length === 0 || Object.keys(next).length === 0) {
    box.innerHTML = '<div class="no-changes">Fill in both shifts to see transitions.</div>';
    return;
  }

  const prevOnField = new Set(Object.values(prev));
  const nextOnField = new Set(Object.values(next));
  const nextPosMap = {};
  Object.entries(next).forEach(([pos, name]) => { nextPosMap[name] = pos; });
  const prevPosMap = {};
  Object.entries(prev).forEach(([pos, name]) => { prevPosMap[name] = pos; });

  const comingOff = [...prevOnField].filter(n => !nextOnField.has(n));
  const comingOn = [...nextOnField].filter(n => !prevOnField.has(n));
  const staying = [...prevOnField].filter(n => nextOnField.has(n));
  const stayingSamePos = staying.filter(n => prevPosMap[n] === nextPosMap[n]);
  const changingPos = staying.filter(n => prevPosMap[n] !== nextPosMap[n]);

  let html = '';

  if (comingOff.length > 0) {
    html += `<div class="transition-section">
      <h3 class="off">COMING OFF (${comingOff.length})</h3>
      ${comingOff.map(n => `<div class="transition-item off callout-big">${esc(displayName(n))}</div>`).join('')}
    </div>`;
  }

  if (comingOn.length > 0) {
    html += `<div class="transition-section">
      <h3 class="on">GOING ON (${comingOn.length})</h3>
      ${comingOn.map(n => {
        const pos = nextPosMap[n];
        const prevPlayer = Object.entries(prev).find(([k, v]) => k === pos);
        const prevName = prevPlayer ? prevPlayer[1] : null;
        let instruction = `→ ${fullPos(pos)}`;
        if (prevName && comingOff.includes(prevName)) {
          instruction += `, send ${esc(displayName(prevName))} off`;
        } else if (prevName && changingPos.includes(prevName)) {
          instruction += `, move ${esc(displayName(prevName))} to ${fullPos(nextPosMap[prevName])}`;
        }
        return `<div class="transition-item on callout-big">${esc(displayName(n))} <span class="transition-arrow">${instruction}</span></div>`;
      }).join('')}
    </div>`;
  }

  if (changingPos.length > 0) {
    html += `<div class="transition-section">
      <h3 class="move">SWITCHING POSITION (${changingPos.length})</h3>
      ${changingPos.map(n => `<div class="transition-item move callout-big">${esc(displayName(n))} <span class="transition-arrow">${fullPos(prevPosMap[n])} → ${fullPos(nextPosMap[n])}</span></div>`).join('')}
    </div>`;
  }

  if (stayingSamePos.length > 0) {
    html += `<div class="transition-section">
      <h3 class="stay">STAYING PUT (${stayingSamePos.length})</h3>
      ${stayingSamePos.map(n => `<div class="transition-item stay">${esc(displayName(n))} <span class="transition-arrow">· ${prevPosMap[n].toUpperCase()}</span></div>`).join('')}
    </div>`;
  }

  if (!html) html = '<div class="no-changes">No differences between these shifts.</div>';
  box.innerHTML = html;
}

// ---- PLAYING TIME ----
function renderPlaytime() {
  const body = document.getElementById('playtime-body');
  const minutesPerShift = state.minutesPerHalf / state.shiftsPerHalf;
  const totalGameMinutes = state.minutesPerHalf * state.halves;

  const playerShifts = {};
  state.checkedIn.forEach(name => { playerShifts[name] = 0; });

  for (let i = 0; i < totalShifts(); i++) {
    const shift = getShift(i);
    Object.values(shift).forEach(name => {
      if (playerShifts[name] !== undefined) playerShifts[name]++;
    });
  }

  const sorted = state.checkedIn.slice().sort((a, b) => playerShifts[a] - playerShifts[b]);
  const maxShifts = totalShifts();

  body.innerHTML = sorted.map(name => {
    const shifts = playerShifts[name];
    const mins = Math.round(shifts * minutesPerShift);
    const pct = maxShifts > 0 ? Math.round((shifts / maxShifts) * 100) : 0;
    let barClass = '';
    if (pct < 40) barClass = 'low';
    else if (pct < 65) barClass = 'mid';

    return `<tr>
      <td style="font-weight:600;">${esc(name)}</td>
      <td>${shifts} / ${maxShifts}</td>
      <td>${mins} min</td>
      <td>${pct}%</td>
      <td><div class="playtime-bar-bg"><div class="playtime-bar ${barClass}" style="width:${pct}%"></div></div></td>
    </tr>`;
  }).join('');
}

// ---- HELPERS ----
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function displayName(s) { return s; }
const POS_FULL_NAMES = {
  gk: 'Goalkeeper', lb: 'Left Back', lcb: 'Left Center Back', rcb: 'Right Center Back',
  rb: 'Right Back', lm: 'Left Mid', cdm: 'Center Defensive Mid', rm: 'Right Mid',
  lw: 'Left Wing', st: 'Striker', rw: 'Right Wing'
};
function fullPos(id) { return POS_FULL_NAMES[id] || id.toUpperCase(); }

// ---- SERVICE WORKER ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

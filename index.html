<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- "black" (opaque) instead of "black-translucent": translucent mode has a
     long-standing iOS bug in standalone PWAs where the viewport is shortened
     by the status-bar height, leaving a dead strip at the bottom -->
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Shift Manager">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Shift Manager</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --black: #1a1a1a;
  --black-mid: #2a2a2a;
  --black-light: #3a3a3a;
  --green-field: #52b788;
  --orange: #e8651a;
  --orange-light: #f07830;
  --white: #ffffff;
  --gray-light: #e9ecef;
  --gray: #adb5bd;
  --gray-dark: #6c757d;
  --red: #e63946;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
  background: var(--black);
  color: var(--white);
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  user-select: none;
  -webkit-user-select: none;
}

/* --- AUTH SCREEN --- */
.auth-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  padding: calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));
  gap: 20px;
}
.auth-screen.hidden { display: none; }
.auth-logo { height: 80px; }
.auth-title { font-size: 28px; font-weight: 700; }
.auth-subtitle { font-size: 14px; color: var(--gray); margin-top: -12px; }
.auth-btn {
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: white;
  color: #333;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.auth-btn:active { opacity: 0.8; }
.auth-error {
  color: var(--red);
  font-size: 13px;
  text-align: center;
  min-height: 18px;
}

/* --- APP WRAPPER --- */
/* Pinned to the physical screen edges: iOS standalone PWAs measure 100dvh
   unreliably, which left a dead strip under the footer */
.app-wrapper { display: none; position: fixed; inset: 0; flex-direction: column; }
.app-wrapper.active { display: flex; }

/* --- NAV --- */
.nav {
  display: flex;
  align-items: center;
  gap: 8px;
  /* keep the header below the iPhone status bar / Dynamic Island in standalone PWA mode */
  padding: calc(8px + env(safe-area-inset-top)) 16px 8px;
  background: rgba(0,0,0,0.3);
  min-height: 48px;
}
#timer-clock {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
  cursor: pointer;
}
.nav .timer-display { font-size: 22px; min-width: 0; }
.clock-sub { font-size: 11px; color: var(--gray); white-space: nowrap; }
.nav .timer-btn {
  width: 48px;
  height: 38px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.nav .timer-btn svg { display: block; }

/* --- BOTTOM NAV --- */
.bottom-nav {
  display: flex;
  gap: 6px;
  padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
  background: #101010;
  border-top: 1px solid rgba(255,255,255,0.12);
  flex-shrink: 0;
}
.bottom-nav .nav-btn {
  flex: 1;
  padding: 13px 2px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--gray);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  min-width: 0;
}
.bottom-nav .nav-btn.active { background: var(--orange); color: white; }
/* Desktop: pre-game tabs sit in the bar and the ⋯ menu is hidden;
   the phone layout flips this (see the mobile media query) */
#more-btn { display: none; }

/* --- SCREENS --- */
/* flex:1 (not a hard-coded height) so the visible screen always gets exactly
   the space left under the nav, whatever height the nav ends up */
.screen { display: none; overflow-y: auto; }
.screen.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }

/* --- ROSTER SCREEN --- */
.roster-screen { padding: 16px; gap: 12px; }
.roster-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.roster-header h2 { font-size: 20px; }
.add-player-row { display: flex; gap: 8px; }
.add-player-row input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.15);
  color: white;
}
.add-player-row input::placeholder { color: rgba(255,255,255,0.5); }
.btn {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-primary { background: var(--orange); color: white; }
.btn-danger { background: var(--red); color: white; }
.btn-gold { background: var(--orange); color: white; }
.btn-sm { padding: 6px 12px; font-size: 13px; }

.roster-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  grid-auto-rows: minmax(48px, 1fr);
  gap: 6px;
  flex: 1;
  overflow-y: auto;
  align-content: stretch;
}
.roster-card {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.roster-card.checked-in {
  background: rgba(232,101,26,0.14);
  border-color: rgba(232,101,26,0.55);
}
.roster-check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  color: transparent;
}
.roster-card.checked-in .roster-check {
  background: var(--orange);
  border-color: var(--orange);
  color: white;
}
.roster-card:not(.checked-in) .roster-name { color: rgba(255,255,255,0.55); }
.roster-name { font-size: 15px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.roster-delete {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.roster-count { font-size: 14px; color: var(--gray); }

/* --- GAME SETUP --- */
.setup-screen { padding: 16px; gap: 16px; }
.setup-screen h2 { font-size: 20px; }
.setup-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.setup-row label { font-size: 14px; font-weight: 600; min-width: 120px; }
.setup-row select, .setup-row input[type="number"] {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.15);
  color: white;
}
.setup-row option { color: black; }

/* --- SHIFTS SCREEN --- */
.shifts-screen.active { display: flex; flex-direction: column; }
.shifts-top-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(0,0,0,0.2);
  flex-wrap: wrap;
}
.shift-tab {
  padding: 6px 14px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.2);
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.shift-tab.active { background: var(--orange); color: white; border-color: var(--orange); }
.half-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray);
  margin-right: 4px;
}

.field-and-bench {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* --- FIELD --- */
.field-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  position: relative;
}
.field {
  width: 100%;
  max-width: 600px;
  aspect-ratio: 1.4;
  background: linear-gradient(180deg, var(--green-field) 0%, #3da77a 100%);
  border-radius: 12px;
  border: 3px solid rgba(255,255,255,0.4);
  position: relative;
  overflow: hidden;
}
.field::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 10%;
  right: 10%;
  height: 2px;
  background: rgba(255,255,255,0.25);
  pointer-events: none;
}
.field::after {
  content: '';
  position: absolute;
  top: 25%;
  left: 30%;
  right: 30%;
  bottom: 25%;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  pointer-events: none;
}

.field-slot {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 72px;
  min-height: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  z-index: 10;
}
.field-slot .pos-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: rgba(255,255,255,0.7);
}
.field-slot .player-badge {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  min-width: 64px;
  border: 2px dashed rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.2);
  white-space: nowrap;
}
.field-slot .player-badge.filled {
  background: rgba(255,255,255,0.95);
  color: var(--black);
  border: 2px solid white;
}
.field-slot .player-badge.highlight-stay {
  background: var(--gray-dark);
  color: white;
  border-color: var(--gray-dark);
}
.field-slot .player-badge.highlight-move {
  background: var(--orange);
  color: white;
  border-color: var(--orange);
}
.field-slot .player-badge.highlight-on {
  background: #2ecc71;
  color: white;
  border-color: #2ecc71;
}
.field-slot.drag-over .player-badge {
  outline: 3px dashed var(--orange);
  outline-offset: 3px;
}
.field-slot.dragging { opacity: 0.4; }
.drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 200;
  padding: 6px 14px;
  border-radius: 10px;
  background: var(--orange);
  color: white;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  transform: translate(-50%, -50%);
}

/* --- BENCH --- */
.bench-panel {
  width: 200px;
  background: rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  padding: 12px;
  gap: 6px;
  overflow-y: auto;
}
.bench-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray);
  margin-bottom: 4px;
}
#bench-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bench-player {
  padding: 8px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.bench-player:active { background: rgba(255,255,255,0.25); }
.bench-player.selected {
  background: var(--orange);
  color: white;
}
.bench-player.on-field {
  opacity: 0.3;
  pointer-events: none;
  text-decoration: line-through;
}

/* --- TRANSITIONS SCREEN --- */
.transitions-screen { padding: 16px; gap: 16px; overflow-y: auto; }
.transitions-screen h2 { font-size: 20px; }
.transition-section { margin-bottom: 12px; }
.transition-section h3 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.transition-section h3.off { color: var(--red); }
.transition-section h3.stay { color: var(--gray); }
.transition-section h3.move { color: var(--orange); }
.transition-section h3.on { color: #2ecc71; }
.transition-item {
  padding: 8px 14px;
  border-radius: 8px;
  margin-bottom: 4px;
  font-size: 16px;
  font-weight: 500;
}
.transition-item.off { background: rgba(230,57,70,0.2); }
.transition-item.stay { background: rgba(72,149,239,0.2); }
.transition-item.move { background: rgba(232,101,26,0.2); }
.transition-item.on { background: rgba(46,204,113,0.2); }
.transition-arrow { color: var(--gray); font-size: 13px; }
.no-changes { color: var(--gray); font-style: italic; }
.transition-stepper { display: flex; gap: 10px; align-items: stretch; }
.step-btn {
  width: 52px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.12);
  color: white;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
.step-btn:disabled { opacity: 0.25; }
.transition-label {
  flex: 1;
  text-align: center;
  background: rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 8px 12px;
  min-width: 0;
}
.transition-label-main { font-size: 18px; font-weight: 700; }
.transition-label-sub { font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }
.now-chip {
  padding: 8px 14px;
  border-radius: 10px;
  border: 2px solid var(--orange);
  background: transparent;
  color: var(--orange);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  flex-shrink: 0;
}
.now-chip.following { background: var(--orange); color: white; }
.sub-countdown { font-size: 14px; color: var(--gray); font-variant-numeric: tabular-nums; }
.callout-box {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  padding: 16px;
  flex: 1;
  overflow-y: auto;
}
.callout-big {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 4px;
}

/* --- TIMER --- */
.timer-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: rgba(0,0,0,0.4);
}
.timer-display {
  font-size: 28px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  min-width: 90px;
}
.timer-display.warning { color: var(--orange); }
.timer-display.danger { color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }
.timer-label { font-size: 13px; color: var(--gray); }
.timer-btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.timer-btn.start { background: #2ecc71; color: white; }
.timer-btn.pause { background: var(--orange); color: white; }
.timer-btn.reset { background: rgba(255,255,255,0.15); color: white; }
.timer-shift-info { margin-left: auto; font-size: 13px; color: var(--gray); text-align: right; }

/* --- PLAYING TIME SCREEN --- */
.playtime-screen { padding: 16px; gap: 12px; overflow-y: auto; }
.playtime-screen h2 { font-size: 20px; }
.playtime-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.playtime-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.playtime-table td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.playtime-bar-bg {
  height: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.1);
  min-width: 100px;
}
.playtime-bar {
  height: 100%;
  border-radius: 4px;
  background: var(--orange);
  transition: width 0.3s;
}
.playtime-bar.low { background: var(--red); }
.playtime-bar.mid { background: var(--orange-light); }

/* --- MODAL --- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #2d3748;
  border-radius: 16px;
  padding: 20px;
  width: 94%;
  max-width: 640px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal h3 { font-size: 18px; margin-bottom: 12px; }
#modal-players {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 8px;
}
.modal-note { grid-column: 1 / -1; font-size: 13px; color: var(--gray); }
.modal-player.full-row { grid-column: 1 / -1; }
.modal-divider {
  grid-column: 1 / -1;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray);
  margin-top: 6px;
  padding-bottom: 2px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.modal-player.dimmed {
  opacity: 0.55;
  background: rgba(255,255,255,0.05);
  font-weight: 500;
}
.sync-input {
  width: 84px;
  padding: 12px 8px;
  border-radius: 10px;
  border: none;
  font-size: 26px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  text-align: center;
  background: rgba(255,255,255,0.12);
  color: white;
}
.sync-time-row {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 10px 0 6px;
}
.sync-colon { font-size: 26px; font-weight: 700; color: var(--gray); }
.sync-caption {
  font-size: 11px;
  font-weight: 700;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.sync-half-btn {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.25);
  background: transparent;
  color: white;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.sync-half-btn.selected { background: var(--orange); border-color: var(--orange); }
.modal-player {
  min-height: 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  transition: background 0.15s;
}
.modal-player:active { background: rgba(255,255,255,0.2); }
.modal-player.current { background: var(--orange); }
.modal-close {
  margin-top: 12px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

/* --- AUTO-FILL --- */
.auto-fill-bar {
  display: flex;
  gap: 8px;
  padding: 4px 0;
  align-items: center;
}
.auto-fill-bar .btn { font-size: 12px; padding: 4px 10px; }

/* --- TOAST --- */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,20,0.95);
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  border: 1px solid rgba(255,255,255,0.15);
  max-width: 90%;
  text-align: center;
}
.toast.show { opacity: 1; }

/* --- LOCK --- */
.lock-btn {
  padding: 5px 10px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.2);
  background: transparent;
  color: var(--gray);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.lock-btn.locked {
  background: var(--red);
  border-color: var(--red);
  color: white;
}

/* --- MID-SHIFT SUB NOTE --- */
.sub-note {
  font-size: 9px;
  color: #ffd9c2;
  background: rgba(0,0,0,0.45);
  padding: 1px 5px;
  border-radius: 6px;
  white-space: nowrap;
}

/* --- SYNC STATUS --- */
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #2ecc71;
  display: inline-block;
  margin-left: 4px;
}
.sync-dot.offline { background: var(--gray); }
.sync-dot.syncing { background: var(--orange); animation: pulse 1s infinite; }

/* ==============================
   PHONE-FRIENDLY RESPONSIVE
   ============================== */
@media (max-width: 600px) {
  /* --- NAV: scrollable row, thumb-height buttons, below the status bar --- */
  .nav {
    padding: calc(6px + env(safe-area-inset-top)) 10px 6px;
    gap: 6px;

    min-height: 52px;
    overflow-x: auto;

  /* --- SCREENS: flex-fill between top strip and bottom nav --- */

  /* --- ROSTER: 2 columns, rows stretch to fill the screen --- */

  /* --- SHIFTS: field+bench scroll in the middle, timer pinned at bottom --- */

  /* --- CALL SUBS / TRANSITIONS --- */

  /* --- MODAL: near-full-screen, 2-column thumb grid --- */

</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="auth-screen">
  <img src="logo.png" alt="Logo" class="auth-logo">
  <div class="auth-title">Shift Manager</div>
  <div class="auth-subtitle">Sign in to manage the lads</div>

  <button class="auth-btn" id="google-signin-btn" style="display:flex;align-items:center;justify-content:center;gap:10px;max-width:360px;width:100%;">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google

</div>

<!-- APP (hidden until logged in) -->
<div class="app-wrapper" id="app-wrapper">
  <!-- Top strip: the game clock, always visible -->
  <nav class="nav">
    <img src="logo.png" alt="Logo" style="height:32px;width:auto;">
    <div id="timer-clock" title="Tap to sync or reset the game clock">
      <span class="timer-display" id="timer-display">0:00</span>
      <span class="clock-sub"><span id="timer-label">Half 1 · Shift 1</span> &#9998;</span>
    </div>

    <span style="flex:1;"></span>
    <button class="timer-btn start" id="timer-start-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M3.5 1.8v10.4a.6.6 0 0 0 .92.5l8.16-5.2a.6.6 0 0 0 0-1L4.42 1.3a.6.6 0 0 0-.92.5z"/></svg></button>
    <span class="sync-dot" id="sync-dot" title="Synced"></span>

  <!-- ROSTER -->
  <div class="screen roster-screen" id="roster-screen">
    <div class="roster-header">
      <h2>Team Roster</h2>
      <span class="roster-count" id="roster-count"></span>
      <span style="margin-left:auto;display:flex;gap:8px;">
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:white;" id="roster-edit-btn">Edit Roster</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:white;" id="new-game-btn">New Game</button>

    <div class="add-player-row" id="add-player-row" style="display:none;">

      <button class="btn btn-primary" id="add-player-btn">Add</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span style="font-size:14px;color:var(--gray);">Tap to check in for today's game</span>
      <button class="btn btn-sm btn-gold" id="check-all-btn">Check All In</button>
    </div>
    <div class="roster-list" id="roster-list"></div>
  </div>

  <!-- SHIFTS -->
  <div class="screen shifts-screen active" id="shifts-screen">
    <div class="shifts-top-bar" id="shifts-top-bar"></div>
    <div class="field-and-bench">
      <div class="field-container">
        <div class="field" id="field"></div>
        <div class="auto-fill-bar">
          <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:white;" id="clear-shift-btn">Clear Shift</button>
          <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:white;" id="copy-prev-btn">Copy Previous Shift</button>
        </div>
      </div>
      <div class="bench-panel">
        <div class="bench-title" id="bench-title">Bench (0)</div>
        <div id="bench-list"></div>
      </div>
    </div>
  </div>

  <!-- TRANSITIONS -->
  <div class="screen transitions-screen" id="transitions-screen">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <h2>Call Substitutions</h2>
      <span class="sub-countdown" id="sub-countdown"></span>
    </div>
    <div class="transition-stepper">
      <button class="step-btn" id="trans-prev">&#9664;</button>
      <div class="transition-label">
        <div class="transition-label-main" id="transition-label-main"></div>
        <div class="transition-label-sub" id="transition-label-sub"></div>
      </div>
      <button class="step-btn" id="trans-next">&#9654;</button>
      <button class="now-chip" id="trans-now">&#9679; LIVE</button>
    </div>
    <div class="callout-box" id="callout-box"></div>
  </div>

  <!-- PLAYING TIME -->
  <div class="screen playtime-screen" id="playtime-screen">
    <h2>Playing Time</h2>
    <table class="playtime-table">
      <thead>
        <tr><th>Player</th><th>Shifts</th><th>Est. Minutes</th><th>% of Game</th><th></th></tr>
      </thead>
      <tbody id="playtime-body"></tbody>
    </table>
  </div>

  <!-- Bottom thumb bar: in-game actions only; pre-game screens live in ⋯ -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="shifts">Shifts</button>
    <button class="nav-btn" data-screen="transitions">Call Subs</button>
    <button class="nav-btn injury-sub-trigger" style="color:#ff9d9d;">In-Shift Sub</button>
    <button class="nav-btn pregame-tab" data-screen="roster">Roster</button>
    <button class="nav-btn pregame-tab" data-screen="playtime">Play Time</button>
    <button class="nav-btn" id="more-btn" style="flex:0 0 56px;font-size:22px;line-height:1;" title="Roster & Play Time">&#8943;</button>
  </nav>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <h3 id="modal-title">Assign Player</h3>
    <div id="modal-players"></div>
    <button class="modal-close" id="modal-close">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ---- FIREBASE INIT ----
firebase.initializeApp({
  apiKey: "AIzaSyBGRVuo3FN6kVBcfRO3ikzcGP1jDAL0h1o",
  authDomain: "river-plate-shift-manager.firebaseapp.com",
  projectId: "river-plate-shift-manager",
  storageBucket: "river-plate-shift-manager.firebasestorage.app",
  messagingSenderId: "301886559365",
  appId: "1:301886559365:web:4f1ad2f29fae9877c805ec"
});

const auth = firebase.auth();
const db = firebase.firestore();

// Enable Firestore offline persistence
db.enablePersistence({ synchronizeTabs: true }).catch(err => {
  console.log('Firestore persistence error:', err.code);
});

// ---- AUTH ----
const authScreen = document.getElementById('auth-screen');
const appWrapper = document.getElementById('app-wrapper');
const authError = document.getElementById('auth-error');
const googleProvider = new firebase.auth.GoogleAuthProvider();

document.getElementById('google-signin-btn').addEventListener('click', async () => {
  authError.textContent = '';
  try {
    await auth.signInWithPopup(googleProvider);
  } catch (err) {
    if (err.code === 'auth/popup-blocked') {
      // Fallback to redirect for iPad/Safari where popups are blocked
      await auth.signInWithRedirect(googleProvider);
    } else if (err.code !== 'auth/popup-closed-by-user') {
      authError.textContent = err.message;
    }
  }
});

document.getElementById('signout-btn').addEventListener('click', () => {
  auth.signOut();
});

// Listen for auth state
let currentUid = null;
auth.onAuthStateChanged(user => {
  if (user) {
    currentUid = user.uid;
    authScreen.classList.add('hidden');
    appWrapper.classList.add('active');
    startRealtimeSync();
  } else {
    currentUid = null;
    if (unsubscribeListener) { unsubscribeListener(); unsubscribeListener = null; }
    authScreen.classList.remove('hidden');
    appWrapper.classList.remove('active');
  }
});

// ---- SYNC STATUS ----
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (status === 'offline' ? ' offline' : status === 'syncing' ? ' syncing' : '');
  dot.title = status === 'offline' ? 'Offline' : status === 'syncing' ? 'Syncing...' : 'Synced';
}

// ---- STATE ----
const DEFAULT_ROSTER = [
  'John', 'Jibby', 'Justin', 'Charlie L', 'Charlie C', 'Emmet', 'Andrew', 'Angel',
  'Sam', 'Theo K', 'Theo F', 'Colby', 'Duanze', 'Eamon', 'Felipe', 'Guillermo',
  'Otto', 'Tom', 'David', 'Greyson'
];

let state = defaultState();

function defaultState() {
  return {
    roster: [...DEFAULT_ROSTER],
    checkedIn: [],
    halves: 2,
    shiftsPerHalf: 3,
    minutesPerHalf: 35,
    shifts: {},
    timerElapsed: 0,
    currentShiftIndex: 0,
    locked: false,
    midShiftSubs: {},
  };
}

// Shared team document — all coaches read/write the same data
const TEAM_DOC = db.collection('teams').doc('river-plate');
let unsubscribeListener = null;
let localSave = false; // flag to ignore our own writes from the listener

// Save to Firestore + localStorage
let saveTimeout = null;
function saveState() {
  // Always save to localStorage immediately for offline speed
  localStorage.setItem('shift-manager-team-state', JSON.stringify(state));

  // Debounce Firestore writes
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    if (!currentUid) return;
    setSyncStatus('syncing');
    localSave = true;
    TEAM_DOC.set({
      roster: state.roster,
      checkedIn: state.checkedIn,
      halves: state.halves,
      shiftsPerHalf: state.shiftsPerHalf,
      minutesPerHalf: state.minutesPerHalf,
      shifts: state.shifts,
      timerElapsed: state.timerElapsed,
      currentShiftIndex: state.currentShiftIndex,
      locked: !!state.locked,
      midShiftSubs: state.midShiftSubs || {},
      updatedBy: currentUid,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      setSyncStatus('online');
    }).catch(() => {
      setSyncStatus('offline');
    });
  }, 500);
}

// Subscribe to real-time updates from the shared team document
function startRealtimeSync() {
  // Load from localStorage first for instant display
  try {
    const local = JSON.parse(localStorage.getItem('shift-manager-team-state'));
    if (local && local.roster) {
      state = { ...defaultState(), ...local };
      renderAll();
    }
  } catch {}

  // Listen for real-time changes — fires immediately with cached data, then on every update
  if (unsubscribeListener) unsubscribeListener();
  unsubscribeListener = TEAM_DOC.onSnapshot(doc => {
    if (localSave) {
      // This is our own write echoing back — skip re-render
      localSave = false;
      return;
    }
    if (doc.exists) {
      const data = doc.data();
      state = { ...defaultState(), ...data };
      if (!state.roster || state.roster.length === 0) state.roster = [...DEFAULT_ROSTER];
      localStorage.setItem('shift-manager-team-state', JSON.stringify(state));
      setSyncStatus(doc.metadata.fromCache ? 'offline' : 'online');
      renderAll();
    } else {
      // First time — initialize the shared team doc
      state = defaultState();
      saveState();
      renderAll();
    }
  }, err => {
    console.log('Firestore listener error:', err);
    setSyncStatus('offline');
  });
}

function renderAll() {
  renderRoster();
  updateTimerBtn();
  updateTimerDisplay();
  renderActiveScreen();
}

// Re-render whichever screen is currently visible (used after remote sync + injury subs)
function renderActiveScreen() {
  const active = document.querySelector('.screen.active');
  if (!active) return;
  if (active.id === 'shifts-screen') renderShifts();
  if (active.id === 'transitions-screen') renderTransitions();
  if (active.id === 'playtime-screen') renderPlaytime();
}

// ---- TOAST ----
let toastTimeout = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('show'), 2200);
}

// ---- IN-APP CONFIRM ----
// Native confirm()/alert() are silently suppressed in iOS home-screen web
// apps, so every yes/no question goes through the modal instead.
function askConfirm(title, detail, yesLabel, noLabel, onYes, onNo) {
  const overlay = document.getElementById('modal-overlay');
  const list = document.getElementById('modal-players');
  document.getElementById('modal-title').textContent = title;
  list.innerHTML = `
    ${detail ? `<div class="modal-note">${detail}</div>` : ''}
    <div class="modal-player full-row" id="confirm-yes" style="background:var(--orange);justify-content:center;text-align:center;font-weight:700;">${yesLabel}</div>
    <div class="modal-player full-row" id="confirm-no" style="justify-content:center;text-align:center;">${noLabel}</div>`;
  overlay.classList.add('active');
  document.getElementById('confirm-yes').addEventListener('click', () => {
    overlay.classList.remove('active');
    onYes();
  });
  document.getElementById('confirm-no').addEventListener('click', () => {
    overlay.classList.remove('active');
    if (onNo) onNo();
  });
}

// ---- LOCK ----
function editLocked() {
  if (state.locked) {
    toast('\u{1F512} Shifts are locked — unlock on the Shifts tab');
    return true;
  }
  return false;
}

// 4-3-3 formation positions (percentage-based coordinates)
const POSITIONS = [
  { id: 'gk',  label: 'GK',  x: 50, y: 90 },
  { id: 'lb',  label: 'LB',  x: 15, y: 72 },
  { id: 'lcb', label: 'LCB', x: 38, y: 75 },
  { id: 'rcb', label: 'RCB', x: 62, y: 75 },
  { id: 'rb',  label: 'RB',  x: 85, y: 72 },
  { id: 'lm',  label: 'LM',  x: 22, y: 47 },
  { id: 'cdm', label: 'CDM', x: 50, y: 52 },
  { id: 'rm',  label: 'RM',  x: 78, y: 47 },
  { id: 'lw',  label: 'LW',  x: 18, y: 20 },
  { id: 'st',  label: 'ST',  x: 50, y: 15 },
  { id: 'rw',  label: 'RW',  x: 82, y: 20 },
];

// ---- NAVIGATION ----
const screens = { roster: 'roster-screen', shifts: 'shifts-screen', transitions: 'transitions-screen', playtime: 'playtime-screen' };

function showScreen(key) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screens[key]).classList.add('active');
  document.querySelectorAll('.bottom-nav .nav-btn[data-screen]').forEach(b => b.classList.toggle('active', b.dataset.screen === key));
  document.getElementById('more-btn').classList.toggle('active', key === 'roster' || key === 'playtime');
  if (key === 'roster') renderRoster();
  if (key === 'shifts') renderShifts();
  if (key === 'transitions') renderTransitions();
  if (key === 'playtime') renderPlaytime();
}

document.querySelectorAll('.nav-btn[data-screen]').forEach(btn => {
  btn.addEventListener('click', () => showScreen(btn.dataset.screen));
});

// ⋯ menu: the pre-game screens
document.getElementById('more-btn').addEventListener('click', () => {
  const overlay = document.getElementById('modal-overlay');
  const list = document.getElementById('modal-players');
  document.getElementById('modal-title').textContent = 'Pre-game';
  list.innerHTML = `
    <div class="modal-player full-row" data-goto="roster">Roster &amp; check-in</div>
    <div class="modal-player full-row" data-goto="playtime">Play Time</div>`;
  overlay.classList.add('active');
  list.querySelectorAll('[data-goto]').forEach(el => el.addEventListener('click', () => {
    overlay.classList.remove('active');
    showScreen(el.dataset.goto);
  }));
});

// ---- ROSTER ----
let rosterEditMode = false;

function renderRoster() {
  const list = document.getElementById('roster-list');
  const count = document.getElementById('roster-count');
  const checkedCount = state.checkedIn.length;
  count.textContent = `${state.roster.length} players | ${checkedCount} checked in`;

  list.innerHTML = [...state.roster].sort((a, b) => a.localeCompare(b)).map(name => {
    const checked = state.checkedIn.includes(name);
    return `<div class="roster-card ${checked ? 'checked-in' : ''}" data-name="${esc(name)}">
      <div class="roster-check">✓</div>
      <div class="roster-name">${esc(name)}</div>
      ${rosterEditMode ? `<button class="roster-delete" data-del="${esc(name)}">x</button>` : ''}
    </div>`;
  }).join('');

  list.querySelectorAll('.roster-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.roster-delete')) return;
      const name = card.dataset.name;
      if (state.checkedIn.includes(name)) {
        state.checkedIn = state.checkedIn.filter(n => n !== name);
      } else {
        state.checkedIn.push(name);
      }
      saveState();
      renderRoster();
    });
  });

  list.querySelectorAll('.roster-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (editLocked()) return;
      const name = btn.dataset.del;
      askConfirm(`Remove ${name} from the roster?`, 'Also clears him out of any shift lineups.', 'Yes — remove', 'Cancel', () => {
        state.roster = state.roster.filter(n => n !== name);
        state.checkedIn = state.checkedIn.filter(n => n !== name);
        Object.keys(state.shifts).forEach(k => {
          const shift = state.shifts[k];
          Object.keys(shift).forEach(pos => { if (shift[pos] === name) delete shift[pos]; });
        });
        saveState();
        renderRoster();
        toast(`${name} removed from the roster`);
      });
    });
  });
}

document.getElementById('add-player-btn').addEventListener('click', addPlayer);
document.getElementById('new-player-input').addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

function addPlayer() {
  const input = document.getElementById('new-player-input');
  const name = input.value.trim();
  if (!name) return;
  if (state.roster.includes(name)) { toast('Player already exists'); return; }
  state.roster.push(name);
  state.checkedIn.push(name);
  input.value = '';
  saveState();

}

document.getElementById('roster-edit-btn').addEventListener('click', () => {

document.getElementById('new-game-btn').addEventListener('click', () => {

// ---- SHIFTS ----
function totalShifts() { return state.halves * state.shiftsPerHalf; }
function shiftKey(i) { return `shift_${i}`; }
function getShift(i) { return state.shifts[shiftKey(i)] || {}; }

function renderShifts() {
  renderShiftTabs();
  renderField();
  renderBench();
  updateTimerDisplay();
}

function renderShiftTabs() {
  const bar = document.getElementById('shifts-top-bar');
  let html = `<button class="lock-btn ${state.locked ? 'locked' : ''}" id="lock-btn">${state.locked ? '\u{1F512} Locked' : '\u{1F513} Open'}</button>`;
  for (let h = 0; h < state.halves; h++) {
    html += `<span class="half-label">${h === 0 ? '1st' : '2nd'} Half</span>`;
    for (let s = 0; s < state.shiftsPerHalf; s++) {
      const idx = h * state.shiftsPerHalf + s;
      html += `<button class="shift-tab ${idx === state.currentShiftIndex ? 'active' : ''}" data-shift="${idx}">Shift ${s + 1}</button>`;
    }
  }
  html += `<span style="margin-left:auto;display:flex;gap:6px;align-items:center;">
    <label style="font-size:12px;color:var(--gray);">Shifts/half:</label>
    <select id="sph-select" ${state.locked ? 'disabled' : ''} style="padding:4px 8px;border-radius:6px;border:none;background:rgba(255,255,255,0.15);color:white;font-size:13px;">
      ${[2,3,4].map(n => `<option value="${n}" ${n === state.shiftsPerHalf ? 'selected' : ''}>${n}</option>`).join('')}
    </select>
    <label style="font-size:12px;color:var(--gray);">Min/half:</label>
    <input type="number" id="mph-input" value="${state.minutesPerHalf}" min="10" max="45" ${state.locked ? 'disabled' : ''} style="width:50px;padding:4px 8px;border-radius:6px;border:none;background:rgba(255,255,255,0.15);color:white;font-size:13px;" />
  </span>`;
  bar.innerHTML = html;

  document.getElementById('lock-btn').addEventListener('click', () => {
    if (state.locked) {
      askConfirm('Unlock shifts for editing?', null, 'Yes — unlock', 'Cancel', () => {
        state.locked = false;
        toast('Shifts unlocked — edits allowed');
        saveState();
        renderShifts();
      });
    } else {
      state.locked = true;
      toast('\u{1F512} Shifts locked — lineups are protected');
      saveState();
      renderShifts();
    }
  });

  bar.querySelectorAll('.shift-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.currentShiftIndex = parseInt(tab.dataset.shift);
      saveState();
      renderShifts();
    });
  });

  document.getElementById('sph-select').addEventListener('change', e => {
    state.shiftsPerHalf = parseInt(e.target.value);
    if (state.currentShiftIndex >= totalShifts()) state.currentShiftIndex = totalShifts() - 1;
    saveState();
    renderShifts();
  });

  document.getElementById('mph-input').addEventListener('change', e => {
    state.minutesPerHalf = parseInt(e.target.value) || 35;
    saveState();
    renderShifts();
  });
}

// ---- DRAG & DROP STATE ----
let dragState = null; // { sourcePos, playerName, ghost, moved }
let dragJustFinished = false; // suppress click after a completed drag

function renderField() {
  const field = document.getElementById('field');
  const shift = getShift(state.currentShiftIndex);
  const subs = (state.midShiftSubs || {})[shiftKey(state.currentShiftIndex)] || [];
  const subByPos = {};
  subs.forEach(s => { subByPos[s.pos] = s; });

  field.innerHTML = POSITIONS.map(pos => {
    const player = shift[pos.id];
    const filledClass = player ? 'filled' : '';
    const sub = subByPos[pos.id];
    const subNote = (sub && player === sub.on) ? `<span class="sub-note">in for ${esc(sub.off)}</span>` : '';
    return `<div class="field-slot" style="left:${pos.x}%;top:${pos.y}%;" data-pos="${pos.id}">
      <span class="pos-label">${pos.label}</span>
      <span class="player-badge ${filledClass}">${player ? esc(displayName(player)) : '—'}</span>
      ${subNote}
    </div>`;
  }).join('');

  field.querySelectorAll('.field-slot').forEach(slot => {
    // --- Touch drag ---
    slot.addEventListener('touchstart', e => {
      const posId = slot.dataset.pos;
      const shift = getShift(state.currentShiftIndex);
      const player = shift[posId];
      if (!player || state.locked) return; // only drag filled slots, never when locked
      const touch = e.touches[0];
      dragState = { sourcePos: posId, playerName: player, ghost: null, moved: false, startX: touch.clientX, startY: touch.clientY };
    }, { passive: true });

    slot.addEventListener('touchmove', e => {
      if (!dragState) return;
      const touch = e.touches[0];
      const dx = touch.clientX - dragState.startX;
      const dy = touch.clientY - dragState.startY;
      // Only start drag after 8px movement to distinguish from tap
      if (!dragState.moved && Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
      e.preventDefault();
      dragState.moved = true;

      // Create ghost if not yet
      if (!dragState.ghost) {
        const ghost = document.createElement('div');
        ghost.className = 'drag-ghost';
        ghost.textContent = displayName(dragState.playerName);
        document.body.appendChild(ghost);
        dragState.ghost = ghost;
        slot.classList.add('dragging');
      }
      dragState.ghost.style.left = touch.clientX + 'px';
      dragState.ghost.style.top = touch.clientY + 'px';

      // Highlight drop target
      field.querySelectorAll('.field-slot').forEach(s => s.classList.remove('drag-over'));
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const targetSlot = target && target.closest('.field-slot');
      if (targetSlot && targetSlot.dataset.pos !== dragState.sourcePos) {
        targetSlot.classList.add('drag-over');
      }
    }, { passive: false });

    slot.addEventListener('touchend', e => {
      // Empty slot tap — no drag was started, open modal
      if (!dragState) {
        e.preventDefault(); // prevent delayed click / ghost-click
        openAssignModal(slot.dataset.pos);
        return;
      }
      if (!dragState.moved) {
        // Filled slot tap (no movement) — open modal
        e.preventDefault();
        dragState = null;
        openAssignModal(slot.dataset.pos);
        return;
      }
      // Completed drag — find drop target
      e.preventDefault();
      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const targetSlot = target && target.closest('.field-slot');
      if (targetSlot && targetSlot.dataset.pos !== dragState.sourcePos) {
        completeDrop(dragState.sourcePos, targetSlot.dataset.pos);
      }
      cleanupDrag();
    });

    // Click handler — opens modal for taps (both empty and filled slots)
    slot.addEventListener('click', e => {
      if (dragJustFinished) { dragJustFinished = false; return; }
      openAssignModal(slot.dataset.pos);
    });

    // --- Mouse drag ---
    slot.addEventListener('mousedown', e => {
      const posId = slot.dataset.pos;
      const shift = getShift(state.currentShiftIndex);
      const player = shift[posId];
      if (!player || state.locked) return; // empty slot or locked — let click handle it
      e.preventDefault();
      dragState = { sourcePos: posId, playerName: player, ghost: null, moved: false, startX: e.clientX, startY: e.clientY };

      function onMouseMove(e) {
        if (!dragState) return;
        const dx = e.clientX - dragState.startX;
        const dy = e.clientY - dragState.startY;
        if (!dragState.moved && Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
        dragState.moved = true;

        if (!dragState.ghost) {
          const ghost = document.createElement('div');
          ghost.className = 'drag-ghost';
          ghost.textContent = displayName(dragState.playerName);
          document.body.appendChild(ghost);
          dragState.ghost = ghost;
          slot.classList.add('dragging');
        }
        dragState.ghost.style.left = e.clientX + 'px';
        dragState.ghost.style.top = e.clientY + 'px';

        field.querySelectorAll('.field-slot').forEach(s => s.classList.remove('drag-over'));
        const target = document.elementFromPoint(e.clientX, e.clientY);
        const ts = target && target.closest('.field-slot');
        if (ts && ts.dataset.pos !== dragState.sourcePos) {
          ts.classList.add('drag-over');
        }
      }

      function onMouseUp(e) {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        if (!dragState) return;
        if (!dragState.moved) {
          // Was a tap — click handler will fire and open modal
          dragState = null;
          return;
        }
        const target = document.elementFromPoint(e.clientX, e.clientY);
        const ts = target && target.closest('.field-slot');
        if (ts && ts.dataset.pos !== dragState.sourcePos) {
          completeDrop(dragState.sourcePos, ts.dataset.pos);
        }
        cleanupDrag();
      }

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  });
}

function completeDrop(sourcePos, targetPos) {
  if (editLocked()) return;
  if (!state.shifts[shiftKey(state.currentShiftIndex)]) state.shifts[shiftKey(state.currentShiftIndex)] = {};
  const shift = state.shifts[shiftKey(state.currentShiftIndex)];
  const draggedPlayer = shift[sourcePos];
  const displacedPlayer = shift[targetPos]; // may be undefined (empty slot)

  // Move dragged player to target position
  shift[targetPos] = draggedPlayer;
  // Clear source — displaced player goes to bench (just remove from field)
  delete shift[sourcePos];

  saveState();
  renderField();
  renderBench();
}

function cleanupDrag() {
  if (dragState && dragState.ghost) {
    dragState.ghost.remove();
  }
  document.querySelectorAll('.field-slot').forEach(s => {
    s.classList.remove('dragging', 'drag-over');
  });
  dragJustFinished = true;
  dragState = null;
  // Reset flag after click event fires (click fires ~0ms after mouseup/touchend)
  setTimeout(() => { dragJustFinished = false; }, 50);
}

function renderBench() {
  const benchList = document.getElementById('bench-list');
  const benchTitle = document.getElementById('bench-title');
  const shift = getShift(state.currentShiftIndex);
  const onField = new Set(Object.values(shift));
  const bench = state.checkedIn.filter(n => !onField.has(n));
  benchTitle.textContent = `Bench (${bench.length})`;

  benchList.innerHTML = [...state.checkedIn].sort((a, b) => a.localeCompare(b)).map(name => {
    const isOnField = onField.has(name);
    return `<div class="bench-player ${isOnField ? 'on-field' : ''}" data-name="${esc(name)}">${esc(displayName(name))}</div>`;
  }).join('');

  benchList.querySelectorAll('.bench-player:not(.on-field)').forEach(el => {
    el.addEventListener('click', () => {
      if (editLocked()) return;
      const name = el.dataset.name;
      const shift = getShift(state.currentShiftIndex);
      const emptyPos = POSITIONS.find(p => !shift[p.id]);
      if (emptyPos) {
        if (!state.shifts[shiftKey(state.currentShiftIndex)]) state.shifts[shiftKey(state.currentShiftIndex)] = {};
        state.shifts[shiftKey(state.currentShiftIndex)][emptyPos.id] = name;
        saveState();
        renderField();
        renderBench();
      }
    });
  });
}

// Assign modal
let assigningPos = null;

function openAssignModal(posId) {
  if (editLocked()) return;
  assigningPos = posId;
  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const playersList = document.getElementById('modal-players');
  const pos = POSITIONS.find(p => p.id === posId);
  const shift = getShift(state.currentShiftIndex);
  const currentPlayer = shift[posId];

  title.textContent = `Assign ${pos.label}`;

  let html = '';
  if (currentPlayer) {
    html += `<div class="modal-player full-row" data-assign="" style="color:var(--red);">Remove ${esc(displayName(currentPlayer))}</div>`;
  }
  const posByName = {};
  Object.entries(shift).forEach(([k, v]) => { posByName[v] = k; });
  const sorted = [...state.checkedIn].sort((a, b) => a.localeCompare(b));
  sorted.filter(n => !posByName[n]).forEach(name => {
    html += `<div class="modal-player" data-assign="${esc(name)}">${esc(name)}</div>`;
  });
  const fieldNames = sorted.filter(n => posByName[n] && n !== currentPlayer);
  if (fieldNames.length > 0) {
    html += `<div class="modal-divider">Already on the field — picking one moves him here</div>`;
    fieldNames.forEach(name => {
      html += `<div class="modal-player dimmed" data-assign="${esc(name)}">${esc(name)} <span style="color:var(--gray);font-size:12px;">(${posByName[name].toUpperCase()})</span></div>`;
    });
  }

  playersList.innerHTML = html;
  overlay.classList.add('active');

  playersList.querySelectorAll('.modal-player').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.assign;
      if (!state.shifts[shiftKey(state.currentShiftIndex)]) state.shifts[shiftKey(state.currentShiftIndex)] = {};
      const shift = state.shifts[shiftKey(state.currentShiftIndex)];
      if (name) {
        Object.keys(shift).forEach(k => { if (shift[k] === name) delete shift[k]; });
        shift[assigningPos] = name;
      } else {
        delete shift[assigningPos];
      }
      saveState();
      overlay.classList.remove('active');
      renderField();
      renderBench();
    });
  });
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('active');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});

document.getElementById('clear-shift-btn').addEventListener('click', () => {
  if (editLocked()) return;
  askConfirm('Clear all players from this shift?', null, 'Yes — clear it', 'Cancel', () => {
    state.shifts[shiftKey(state.currentShiftIndex)] = {};
    saveState();
    renderField();
    renderBench();
  });
});

document.getElementById('copy-prev-btn').addEventListener('click', () => {
  if (editLocked()) return;
  if (state.currentShiftIndex === 0) { toast('No previous shift'); return; }
  const prev = getShift(state.currentShiftIndex - 1);
  state.shifts[shiftKey(state.currentShiftIndex)] = { ...prev };
  saveState();
  renderField();
  renderBench();
});

// ---- TIMER ----
let timerInterval = null;
let timerRunning = false;

function shiftDuration() {
  return (state.minutesPerHalf / state.shiftsPerHalf) * 60;
}

document.getElementById('timer-start-btn').addEventListener('click', () => {
  if (timerRunning) {
    timerRunning = false;
    clearInterval(timerInterval);
    updateTimerBtn();
  } else {
    timerRunning = true;
    let lastTick = Date.now();
    timerInterval = setInterval(() => {
      const now = Date.now();
      state.timerElapsed += (now - lastTick) / 1000;
      lastTick = now;
      updateTimerDisplay();
      checkShiftAlarm();
    }, 250);
    updateTimerBtn();
  }
});

function resetClock() {
  timerRunning = false;
  state.timerElapsed = 0;
  clearInterval(timerInterval);
  lastAlarmShift = -1;
  saveState();
  updateTimerDisplay();
  updateTimerBtn();
}

function updateTimerDisplay() {
  const display = document.getElementById('timer-display');
  const label = document.getElementById('timer-label');
  const info = document.getElementById('timer-shift-info');
  const dur = shiftDuration();
  const gameElapsed = state.timerElapsed;
  const currentShiftNum = Math.min(Math.floor(gameElapsed / dur), totalShifts() - 1);
  const shiftElapsed = gameElapsed - (currentShiftNum * dur);
  const remaining = Math.max(0, dur - shiftElapsed);

  const mins = Math.floor(remaining / 60);
  const secs = Math.floor(remaining % 60);
  display.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

  display.className = 'timer-display';
  if (remaining < 60 && remaining > 15) display.classList.add('warning');
  if (remaining <= 15 && timerRunning) display.classList.add('danger');

  const halfNum = Math.floor(currentShiftNum / state.shiftsPerHalf) + 1;
  const shiftInHalf = (currentShiftNum % state.shiftsPerHalf) + 1;
  label.textContent = `Half ${halfNum} · Shift ${shiftInHalf}`;

  const gameMins = Math.floor(gameElapsed / 60);
  const gameSecs = Math.floor(gameElapsed % 60);
  info.textContent = `Game: ${gameMins}:${gameSecs.toString().padStart(2, '0')} | ${Math.round(dur / 60)} min shifts`;

  // Keep Call Subs in sync with the game clock while that screen is open
  const transScreen = document.getElementById('transitions-screen');
  if (transScreen && transScreen.classList.contains('active')) {
    updateSubCountdown();
    if (transitionFollowGame && selectedTransition !== upcomingTransition()) renderTransitions();
  }
}

function updateTimerBtn() {
  const btn = document.getElementById('timer-start-btn');
  if (timerRunning) {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="2.2" y="1.5" width="3.6" height="11" rx="1.3"/><rect x="8.2" y="1.5" width="3.6" height="11" rx="1.3"/></svg>';
    btn.className = 'timer-btn pause';
    btn.title = 'Pause the game clock';
  } else {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M3.5 1.8v10.4a.6.6 0 0 0 .92.5l8.16-5.2a.6.6 0 0 0 0-1L4.42 1.3a.6.6 0 0 0-.92.5z"/></svg>';
    btn.className = 'timer-btn start';
    btn.title = 'Start the game clock';
  }
}

let lastAlarmShift = -1;
function checkShiftAlarm() {
  const dur = shiftDuration();
  const currentShiftNum = Math.floor(state.timerElapsed / dur);
  if (currentShiftNum > lastAlarmShift && currentShiftNum > 0 && currentShiftNum < totalShifts()) {
    lastAlarmShift = currentShiftNum;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 200, 400].forEach(delay => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        osc.start(ctx.currentTime + delay / 1000);
        osc.stop(ctx.currentTime + delay / 1000 + 0.15);
      });
    } catch {}
  }
}

// ---- TRANSITIONS ----
// The screen follows the game clock by default: it auto-selects the transition
// into the UPCOMING shift. Arrow buttons override; NOW resumes following.
let transitionFollowGame = true;
let selectedTransition = 1;

function gameCurrentShiftIndex() {
  if (state.timerElapsed > 0 || timerRunning) {
    return Math.min(Math.floor(state.timerElapsed / shiftDuration()), totalShifts() - 1);
  }
  return state.currentShiftIndex;
}

function upcomingTransition() {
  const cur = Math.min(Math.floor(state.timerElapsed / shiftDuration()), totalShifts() - 1);
  return Math.max(1, Math.min(cur + 1, totalShifts() - 1));
}

function transitionLabel(i) {
  const inHalf = i % state.shiftsPerHalf;
  if (inHalf === 0) return { main: 'Halftime', sub: 'into 2nd Half · Shift 1' };
  const halfName = Math.floor(i / state.shiftsPerHalf) === 0 ? '1st Half' : '2nd Half';
  return { main: `Shift ${inHalf} → ${inHalf + 1}`, sub: halfName };
}

function shiftDisplayName(i) {
  const half = Math.floor(i / state.shiftsPerHalf) === 0 ? '1st Half' : '2nd Half';
  return `${half} · Shift ${(i % state.shiftsPerHalf) + 1}`;
}

function renderTransitions() {
  if (totalShifts() < 2) return;
  if (transitionFollowGame) selectedTransition = upcomingTransition();
  selectedTransition = Math.max(1, Math.min(selectedTransition, totalShifts() - 1));
  const lbl = transitionLabel(selectedTransition);
  const gameStarted = state.timerElapsed > 0 || timerRunning;
  const isNext = gameStarted && selectedTransition === upcomingTransition();
  document.getElementById('transition-label-main').textContent = lbl.main;
  document.getElementById('transition-label-sub').textContent = lbl.sub + (isNext ? ' · up next' : '');
  document.getElementById('trans-prev').disabled = selectedTransition <= 1;
  document.getElementById('trans-next').disabled = selectedTransition >= totalShifts() - 1;
  // Following the game clock → "● LIVE" indicator; browsing with the arrows → "GO LIVE" button to snap back
  const nowChip = document.getElementById('trans-now');
  nowChip.classList.toggle('following', transitionFollowGame);
  nowChip.innerHTML = transitionFollowGame ? '&#9679; LIVE' : 'GO LIVE';
  renderTransitionDetail(selectedTransition);
  updateSubCountdown();
}

function updateSubCountdown() {
  const el = document.getElementById('sub-countdown');
  if (!el) return;
  if (state.timerElapsed <= 0 && !timerRunning) {
    el.textContent = 'Start the timer on Shifts to follow the game';
    return;
  }
  const dur = shiftDuration();
  const cur = Math.floor(state.timerElapsed / dur);
  if (cur >= totalShifts() - 1) {
    el.textContent = 'Final shift — no subs left';
    return;
  }
  const remaining = Math.max(0, dur * (cur + 1) - state.timerElapsed);
  const m = Math.floor(remaining / 60);
  const s = Math.floor(remaining % 60);
  el.textContent = `Next sub in ${m}:${s.toString().padStart(2, '0')}`;
}

document.getElementById('trans-prev').addEventListener('click', () => {
  transitionFollowGame = false;
  selectedTransition = Math.max(1, selectedTransition - 1);
  renderTransitions();
});
document.getElementById('trans-next').addEventListener('click', () => {
  transitionFollowGame = false;
  selectedTransition = Math.min(totalShifts() - 1, selectedTransition + 1);
  renderTransitions();
});
document.getElementById('trans-now').addEventListener('click', () => {
  transitionFollowGame = true;
  renderTransitions();
});

function renderTransitionDetail(toIndex) {
  const box = document.getElementById('callout-box');
  const prev = getShift(toIndex - 1);
  const next = getShift(toIndex);

  if (Object.keys(prev).length === 0 || Object.keys(next).length === 0) {
    box.innerHTML = '<div class="no-changes">Fill in both shifts to see transitions.</div>';
    return;
  }

  const prevOnField = new Set(Object.values(prev));
  const nextOnField = new Set(Object.values(next));
  const nextPosMap = {};
  Object.entries(next).forEach(([pos, name]) => { nextPosMap[name] = pos; });
  const prevPosMap = {};
  Object.entries(prev).forEach(([pos, name]) => { prevPosMap[name] = pos; });

  const comingOff = [...prevOnField].filter(n => !nextOnField.has(n));
  const comingOn = [...nextOnField].filter(n => !prevOnField.has(n));
  const staying = [...prevOnField].filter(n => nextOnField.has(n));
  const stayingSamePos = staying.filter(n => prevPosMap[n] === nextPosMap[n]);
  const changingPos = staying.filter(n => prevPosMap[n] !== nextPosMap[n]);

  let html = '';

  const openSpots = POSITIONS.filter(p => !next[p.id]);
  if (openSpots.length > 0) {
    html += `<div class="transition-section">
      <div class="transition-item" style="background:rgba(230,57,70,0.35);font-weight:700;">⚠️ ${openSpots.length} open spot${openSpots.length > 1 ? 's' : ''} in this shift: ${openSpots.map(p => fullPos(p.id)).join(', ')} — fill on the Shifts tab</div>
    </div>`;
  }

  if (comingOff.length > 0) {
    html += `<div class="transition-section">
      <h3 class="off">COMING OFF (${comingOff.length})</h3>
      ${comingOff.map(n => `<div class="transition-item off callout-big">${esc(displayName(n))}</div>`).join('')}
    </div>`;
  }

  if (comingOn.length > 0) {
    html += `<div class="transition-section">
      <h3 class="on">GOING ON (${comingOn.length})</h3>
      ${comingOn.map(n => {
        const pos = nextPosMap[n];
        const prevPlayer = Object.entries(prev).find(([k, v]) => k === pos);
        const prevName = prevPlayer ? prevPlayer[1] : null;
        let instruction = `→ ${fullPos(pos)}`;
        if (prevName && comingOff.includes(prevName)) {
          instruction += `, send ${esc(displayName(prevName))} off`;
        } else if (prevName && changingPos.includes(prevName)) {
          instruction += `, move ${esc(displayName(prevName))} to ${fullPos(nextPosMap[prevName])}`;
        }
        return `<div class="transition-item on callout-big">${esc(displayName(n))} <span class="transition-arrow">${instruction}</span></div>`;
      }).join('')}
    </div>`;
  }

  if (changingPos.length > 0) {
    html += `<div class="transition-section">
      <h3 class="move">SWITCHING POSITION (${changingPos.length})</h3>
      ${changingPos.map(n => `<div class="transition-item move callout-big">${esc(displayName(n))} <span class="transition-arrow">${fullPos(prevPosMap[n])} → ${fullPos(nextPosMap[n])}</span></div>`).join('')}
    </div>`;
  }

  if (stayingSamePos.length > 0) {
    html += `<div class="transition-section">
      <h3 class="stay">STAYING PUT (${stayingSamePos.length})</h3>
      ${stayingSamePos.map(n => `<div class="transition-item stay">${esc(displayName(n))} <span class="transition-arrow">· ${prevPosMap[n].toUpperCase()}</span></div>`).join('')}
    </div>`;
  }

  if (!html) html = '<div class="no-changes">No differences between these shifts.</div>';
  box.innerHTML = html;
}

// ---- MID-SHIFT (INJURY) SUBS ----
// Allowed even while shifts are locked — injuries don't wait for an unlock.
// Swaps the replacement into the current shift's lineup so the next sub
// callout is computed from who is actually on the field.
function openInjurySubModal() {
  const idx = gameCurrentShiftIndex();
  const shift = getShift(idx);
  const entries = Object.entries(shift);
  if (entries.length === 0) { toast(`No lineup set for ${shiftDisplayName(idx)}`); return; }

  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const playersList = document.getElementById('modal-players');
  title.textContent = 'In-shift sub — who is going off?';
  playersList.innerHTML =
    `<div class="modal-note">Current shift: ${shiftDisplayName(idx)}${state.locked ? ' · allowed while locked' : ''}</div>` +
    entries.sort((a, b) => a[1].localeCompare(b[1])).map(([pos, name]) =>
      `<div class="modal-player" data-off="${esc(name)}" data-pos="${pos}">${esc(name)} <span style="color:var(--gray);font-size:12px;">(${fullPos(pos)})</span></div>`
    ).join('');
  overlay.classList.add('active');

  playersList.querySelectorAll('.modal-player').forEach(el => {
    el.addEventListener('click', () => pickFillFor(idx, el.dataset.pos, el.dataset.off, [], { name: el.dataset.off, pos: el.dataset.pos }));
  });
}

// Ask who takes over `openPos`. The answer can be a bench player (done), an
// on-field player sliding over (which opens HIS old spot — recurse), or
// "leave the spot open".
function pickFillFor(idx, openPos, displacedName, moves, injured) {
  const playersList = document.getElementById('modal-players');
  const shift = getShift(idx);
  const onField = new Set(Object.values(shift));
  const unavailable = new Set([injured.name, ...moves.map(m => m.player)]);
  const bench = state.checkedIn.filter(n => !onField.has(n)).sort((a, b) => a.localeCompare(b));
  const fieldOptions = Object.entries(shift)
    .filter(([p, n]) => !unavailable.has(n) && p !== openPos)
    .sort((a, b) => a[1].localeCompare(b[1]));

  document.getElementById('modal-title').textContent = `Who takes ${fullPos(openPos)}?`;
  let html = `<div class="modal-note">${esc(displacedName)} is leaving ${fullPos(openPos)}</div>`;
  bench.forEach(n => {
    html += `<div class="modal-player" data-bench="${esc(n)}">${esc(n)}</div>`;
  });
  if (fieldOptions.length > 0) {
    html += `<div class="modal-divider">Or slide over an on-field player</div>`;
    fieldOptions.forEach(([p, n]) => {
      html += `<div class="modal-player dimmed" data-field="${esc(n)}" data-frompos="${p}">${esc(n)} <span style="color:var(--gray);font-size:12px;">(from ${p.toUpperCase()})</span></div>`;
    });
  }
  html += `<div class="modal-player full-row" data-leave-open="1" style="color:var(--gray);">Leave ${fullPos(openPos)} open</div>`;
  playersList.innerHTML = html;

  playersList.querySelectorAll('.modal-player').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.bench) {
        finalizeInjurySub(idx, injured, moves, { name: el.dataset.bench, pos: openPos });
      } else if (el.dataset.field) {
        pickFillFor(idx, el.dataset.frompos, el.dataset.field,
          [...moves, { player: el.dataset.field, from: el.dataset.frompos, to: openPos }], injured);
      } else {
        finalizeInjurySub(idx, injured, moves, null);
      }
    });
  });
}

function finalizeInjurySub(idx, injured, moves, entrant) {
  const key = shiftKey(idx);
  if (!state.shifts[key]) state.shifts[key] = {};
  const shift = state.shifts[key];
  delete shift[injured.pos];
  moves.forEach(m => { delete shift[m.from]; shift[m.to] = m.player; });
  if (entrant) shift[entrant.pos] = entrant.name;

  if (!state.midShiftSubs) state.midShiftSubs = {};
  if (!state.midShiftSubs[key]) state.midShiftSubs[key] = [];
  state.midShiftSubs[key].push({ off: injured.name, on: entrant ? entrant.name : '', pos: entrant ? entrant.pos : injured.pos });

  const parts = moves.map(m => `${m.player} → ${m.to.toUpperCase()}`);
  if (entrant) parts.push(`${entrant.name} on at ${entrant.pos.toUpperCase()}`);
  const summary = parts.length ? parts.join(', ') : 'spot left open';

  saveState();
  renderActiveScreen();

  const future = [];
  for (let i = idx + 1; i < totalShifts(); i++) {
    if (Object.values(getShift(i)).includes(injured.name)) future.push(i);
  }
  if (future.length > 0) {
    askConfirm(`Remove ${injured.name} from later shifts?`,
      `${injured.name} is still lined up in ${future.length} upcoming shift(s). Remove him and leave those spots open to refill?`,
      `Yes — remove from ${future.length} shift(s)`,
      'No — keep him in later shifts',
      () => {
        future.forEach(i => {
          const s = state.shifts[shiftKey(i)];
          Object.keys(s).forEach(p => { if (s[p] === injured.name) delete s[p]; });
        });
        saveState();
        renderActiveScreen();
        toast(`${injured.name} off: ${summary} · removed from later shifts`);
      },
      () => toast(`${injured.name} off: ${summary}`));
  } else {
    document.getElementById('modal-overlay').classList.remove('active');
    toast(`${injured.name} off: ${summary}`);
  }
}

document.querySelectorAll('.injury-sub-trigger').forEach(btn => {
  btn.addEventListener('click', openInjurySubModal);
});

// ---- CLOCK SYNC ----
// For when the ref started the game before the in-app timer: ask the ref how
// much time is left in the half and set the clock to match.
document.getElementById('timer-clock').addEventListener('click', () => {
  const overlay = document.getElementById('modal-overlay');
  const playersList = document.getElementById('modal-players');
  document.getElementById('modal-title').textContent = 'Game clock';
  let half = state.timerElapsed >= state.minutesPerHalf * 60 ? 1 : 0;

  playersList.innerHTML = `
    <div class="modal-note" style="display:flex;gap:8px;">
      <button class="sync-half-btn" id="sync-h1">1st Half</button>
      <button class="sync-half-btn" id="sync-h2">2nd Half</button>
    </div>
    <div class="sync-time-row">
      <div style="display:flex;align-items:center;gap:10px;">
        <input class="sync-input" id="sync-min" type="number" inputmode="numeric" min="0" max="${state.minutesPerHalf}" value="${state.minutesPerHalf}">
        <span class="sync-colon">:</span>
        <input class="sync-input" id="sync-sec" type="number" inputmode="numeric" min="0" max="59" value="0">
      </div>
      <div class="sync-caption">Time left in the half</div>
    </div>
    <div class="modal-player full-row" id="sync-apply" style="background:var(--orange);text-align:center;justify-content:center;align-items:center;font-weight:700;">Sync &amp; Start Clock</div>
    <div class="modal-player full-row" id="sync-reset" style="background:transparent;color:var(--red);text-align:center;justify-content:center;align-items:center;font-size:14px;">Reset clock to 0:00</div>`;
  overlay.classList.add('active');

  document.getElementById('sync-reset').addEventListener('click', () => {
    askConfirm('Reset the game clock to 0:00?', null, 'Yes — reset', 'Cancel', () => {
      resetClock();
      toast('Clock reset');
    });
  });

  const paint = () => {
    document.getElementById('sync-h1').classList.toggle('selected', half === 0);
    document.getElementById('sync-h2').classList.toggle('selected', half === 1);
  };
  paint();
  document.getElementById('sync-h1').addEventListener('click', () => { half = 0; paint(); });
  document.getElementById('sync-h2').addEventListener('click', () => { half = 1; paint(); });

  document.getElementById('sync-apply').addEventListener('click', () => {
    const mins = Math.max(0, Math.min(state.minutesPerHalf, parseInt(document.getElementById('sync-min').value) || 0));
    const secs = Math.max(0, Math.min(59, parseInt(document.getElementById('sync-sec').value) || 0));
    const left = Math.min(state.minutesPerHalf * 60, mins * 60 + secs);
    state.timerElapsed = half * state.minutesPerHalf * 60 + (state.minutesPerHalf * 60 - left);
    lastAlarmShift = Math.floor(state.timerElapsed / shiftDuration()); // don't replay old shift alarms
    overlay.classList.remove('active');
    if (!timerRunning) document.getElementById('timer-start-btn').click();
    saveState();
    updateTimerDisplay();
    toast(`Clock synced — ${mins}:${secs.toString().padStart(2, '0')} left in the ${half === 0 ? '1st' : '2nd'} half`);
  });
});

// ---- PLAYING TIME ----
function renderPlaytime() {
  const body = document.getElementById('playtime-body');
  const minutesPerShift = state.minutesPerHalf / state.shiftsPerHalf;
  const totalGameMinutes = state.minutesPerHalf * state.halves;

  const playerShifts = {};
  state.checkedIn.forEach(name => { playerShifts[name] = 0; });

  for (let i = 0; i < totalShifts(); i++) {
    const shift = getShift(i);
    Object.values(shift).forEach(name => {
      if (playerShifts[name] !== undefined) playerShifts[name]++;
    });
  }

  // Mid-shift subs: split that shift's credit between the two players
  const allSubs = state.midShiftSubs || {};
  Object.keys(allSubs).forEach(k => {
    const idx = parseInt(k.split('_')[1]);
    if (isNaN(idx) || idx >= totalShifts()) return;
    allSubs[k].forEach(s => {
      if (playerShifts[s.on] !== undefined) playerShifts[s.on] -= 0.5;
      if (playerShifts[s.off] !== undefined) playerShifts[s.off] += 0.5;
    });
  });

  const sorted = state.checkedIn.slice().sort((a, b) => playerShifts[a] - playerShifts[b]);
  const maxShifts = totalShifts();

  body.innerHTML = sorted.map(name => {
    const shifts = playerShifts[name];
    const mins = Math.round(shifts * minutesPerShift);
    const pct = maxShifts > 0 ? Math.round((shifts / maxShifts) * 100) : 0;
    let barClass = '';
    if (pct < 40) barClass = 'low';
    else if (pct < 65) barClass = 'mid';

    return `<tr>
      <td style="font-weight:600;">${esc(name)}</td>
      <td>${Number.isInteger(shifts) ? shifts : shifts.toFixed(1)} / ${maxShifts}</td>
      <td>${mins} min</td>
      <td>${pct}%</td>
      <td><div class="playtime-bar-bg"><div class="playtime-bar ${barClass}" style="width:${pct}%"></div></div></td>
    </tr>`;
  }).join('');
}

// ---- HELPERS ----
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function displayName(s) { return s; }
const POS_FULL_NAMES = {
  gk: 'Goalkeeper', lb: 'Left Back', lcb: 'Left Center Back', rcb: 'Right Center Back',
  rb: 'Right Back', lm: 'Left Mid', cdm: 'Center Defensive Mid', rm: 'Right Mid',
  lw: 'Left Wing', st: 'Striker', rw: 'Right Wing'
};
function fullPos(id) { return POS_FULL_NAMES[id] || id.toUpperCase(); }

// ---- SERVICE WORKER ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
